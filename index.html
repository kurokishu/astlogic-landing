/* ────────── Viewport hook ────────── */
const VPCtx = createContext({ w:1200, mob:false, tab:false });
function useVP(){ return useContext(VPCtx); }
function VPProvider({children}){
  const [w,setW]=useState(typeof window!=='undefined'?window.innerWidth:1200);
  useEffect(()=>{ const fn=()=>setW(window.innerWidth); window.addEventListener('resize',fn); return ()=>window.removeEventListener('resize',fn); },[]);
  return React.createElement(VPCtx.Provider,{value:{w,mob:w<768,tab:w>=768&&w<1024}},children);
}

/* ────────── Reveal (scroll fade-up) ────────── */
function Reveal({children,delay=0,style={}}){
  const [on,setOn]=useState(false); const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    const io=new IntersectionObserver(([e])=>{if(e.isIntersecting){setOn(true);io.disconnect();}},{threshold:0.06,rootMargin:'0px 0px -32px 0px'});
    io.observe(ref.current); return ()=>io.disconnect();
  },[]);
  return <div ref={ref} style={{opacity:on?1:0,transform:on?'none':'translateY(20px)',transition:`opacity 900ms var(--ease-out) ${delay}ms, transform 900ms var(--ease-out) ${delay}ms`,willChange:'opacity, transform',...style}}>{children}</div>;
}

/* ────────── Shared UI ────────── */
function SectionLabel({children,sub,rule,align='left',size='md',tone='dark'}){
  const c = tone==='light'?'var(--text-on-dark)':'var(--ink-700)';
  const rc = tone==='light'?'var(--line-on-dark)':'var(--ink-100)';
  return (
    <div style={{textAlign:align}}>
      <div style={{display:'flex',alignItems:'center',gap:24,justifyContent:align==='center'?'center':'flex-start'}}>
        <span style={{fontFamily:'"EB Garamond","Shippori Mincho",serif',fontSize:size==='sm'?'0.6875rem':'0.8125rem',letterSpacing:'0.28em',textTransform:'uppercase',color:c,whiteSpace:'nowrap'}}>{children}</span>
        {rule && <span style={{flex:1,height:1,background:rc}} />}
      </div>
      {sub && <div style={{fontFamily:'"Shippori Mincho",serif',fontSize:'0.875rem',letterSpacing:'0.08em',color:tone==='light'?'var(--text-on-dark-s)':'var(--ink-500)',marginTop:10}}>{sub}</div>}
    </div>
  );
}

function SectionHead({label,sub,viewAll,onViewAll,tone='dark',center}){
  if(center) return <div style={{textAlign:'center',marginBottom:'clamp(28px,3.5vw,48px)'}}><SectionLabel align="center" sub={sub} tone={tone}>{label}</SectionLabel></div>;
  return (
    <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:'clamp(28px,3.5vw,48px)',gap:24}}>
      <SectionLabel sub={sub} tone={tone}>{label}</SectionLabel>
      {viewAll && <a href="#" onClick={e=>{e.preventDefault();onViewAll&&onViewAll();}} style={{fontFamily:'"EB Garamond",serif',fontSize:'0.6875rem',letterSpacing:'0.34em',textTransform:'uppercase',color:tone==='light'?'var(--text-on-dark)':'var(--ink-700)',display:'inline-flex',alignItems:'center',gap:10,whiteSpace:'nowrap',flexShrink:0}}>VIEW ALL <span>→</span></a>}

function Section({children,bg='var(--paper-050)',py='var(--section-y)',style={}}){

function Btn({children,variant='primary',size='md',full,arrow,onClick,style={}}){
  const [h,setH]=useState(false);
  const pad={sm:'12px 22px',md:'17px 30px',lg:'22px 40px'}[size];
  const base={fontFamily:'"EB Garamond",serif',fontSize:'0.8125rem',letterSpacing:'0.28em',textTransform:'uppercase',display:full?'flex':'inline-flex',width:full?'100%':'auto',alignItems:'center',justifyContent:'center',gap:14,padding:variant==='text'?0:pad,border:'1px solid transparent',borderRadius:'2px',lineHeight:1,whiteSpace:'nowrap',transition:'all var(--dur-base) var(--ease-out)'};
  const v={primary:{background:'var(--ink-900)',color:'var(--paper-000)',borderColor:'var(--ink-900)'},secondary:{background:'transparent',color:'var(--ink-700)',borderColor:'var(--ink-200)'},text:{background:'transparent',color:'var(--ink-700)',borderColor:'transparent'}}[variant];
  const ho=h?(variant==='primary'?{opacity:0.82}:variant==='secondary'?{borderColor:'var(--ink-700)'}:{opacity:0.55}):{};
  return <button onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{...base,...v,...ho,...style}}><span>{children}</span>{arrow&&<span style={{letterSpacing:0}}>→</span>}</button>;
}

function Input({label,placeholder,multiline,rows=4}){

}

function Tag({children,variant='outline'}){

  return <span style={{...s,background:'var(--ink-900)',color:'var(--paper-000)'}}>{children}</span>;

        <div style={{padding:`clamp(40px,5vw,80px) ${g}`}}>

          <h2 style={{fontFamily:'"Shippori Mincho",serif',fontWeight:500,fontSize:mob?'1.3rem':'clamp(20px,2.4vw,28px)',letterSpacing:'0.06em',margin:'18px 0 0'}}>AstLogicという名に込めた想い</h2>

        </div>
        <div style={{minHeight:mob?240:420,display:'flex',alignItems:'center',justifyContent:'center',padding:'clamp(20px,3vw,48px)'}}><img src={img('brush-wordmark.jpg')} alt="Ast Logic" style={{width:'100%',maxWidth:400}}/></div>
      </div>
    </section>
    <Band imgSrc={img('about-pendant-making.jpg')} imgOrder={2}>
      <SectionLabel size="sm">OUR PROMISE</SectionLabel>

      <p style={{fontFamily:'"Shippori Mincho",serif',fontSize:13.5,lineHeight:2.1,color:'var(--ink-500)',marginTop:22,maxWidth:440}}>備長炭アクセサリーは、自然が生んだ造形をそのまま写し取るため、同じものは二つと生まれません。だからこそ、備長炭アクセサリーのみを一点物としてお届けします。</p>

}

/* ================================================================
   APP
   ================================================================ */
const ACTIVE_MAP = {
  HOME:null, COLLECTION:'COLLECTION', PRODUCT:'COLLECTION',
  ARCHIVE:'ARCHIVE', ARCHIVE_DETAIL:'ARCHIVE', CRAFTSMANSHIP:'CRAFTSMANSHIP',
  ABOUT:'ABOUT', JOURNAL:'JOURNAL', CONTACT:'CONTACT', MATERIAL:null,
};

function App(){
  const [screen,setScreen]=useState('HOME');
  const [prodIdx,setProdIdx]=useState(0);
  const [cart,setCart]=useState(0);
  const go=useCallback(t=>{if(t==='CART')return;setScreen(t);window.scrollTo({top:0,behavior:'auto'});},[]);
  const openProduct=useCallback(i=>{setProdIdx(i);setScreen('PRODUCT');window.scrollTo(0,0);},[]);
  const openArchive=useCallback(()=>{setScreen('ARCHIVE_DETAIL');window.scrollTo(0,0);},[]);
  const addToCart=useCallback(()=>setCart(c=>c+1),[]);
  const isHome=screen==='HOME';

  let body;
  switch(screen){
    case 'HOME': body=<HomeScreen go={go} openProduct={openProduct}/>; break;
    case 'COLLECTION': body=<CollectionScreen go={go} openProduct={openProduct}/>; break;
    case 'PRODUCT': body=<ProductScreen go={go} productIndex={prodIdx} addToCart={addToCart} openProduct={openProduct}/>; break;
    case 'ARCHIVE': body=<ArchiveScreen go={go} openArchive={openArchive}/>; break;
    case 'ARCHIVE_DETAIL': body=<ArchiveDetailScreen go={go}/>; break;
    case 'CRAFTSMANSHIP': body=<CraftsmanshipScreen go={go}/>; break;
    case 'ABOUT': body=<AboutScreen go={go}/>; break;
    case 'JOURNAL': body=<JournalScreen go={go}/>; break;
    case 'CONTACT': body=<ContactScreen go={go}/>; break;
    case 'MATERIAL': body=<MaterialScreen go={go}/>; break;
    default: body=<HomeScreen go={go} openProduct={openProduct}/>;
  }

  const header=<SiteHeader variant={isHome?'transparent':'solid'} tone="dark" active={ACTIVE_MAP[screen]} cartCount={cart} onNav={go}/>;

  return (
    <div style={{position:'relative'}}>
      {isHome
        ? <div style={{position:'absolute',top:0,left:0,right:0,zIndex:100}}>{header}</div>
        : header}
      <main>{body}</main>
      <SiteFooter tone="light" onNav={go}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <VPProvider><App/></VPProvider>
);
</script>
</body>
</html>
